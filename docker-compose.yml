services:
  postgres:
    image: postgres:16-alpine
    container_name: dse-pms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dsepms
      POSTGRES_PASSWORD: dsepms
      POSTGRES_DB: dsepms
    ports:
      - "5432:5432"
    volumes:
      - dse_pms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsepms -d dsepms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dse_pms_pgdata:
