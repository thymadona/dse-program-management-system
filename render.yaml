# Render Blueprint for the DSE-PMS backend API.
# The database lives on Supabase (managed Postgres) — Render only runs the API.
# Deploy: push this file, then in Render → New → Blueprint, point at this repo.
services:
  - type: web
    name: dse-pms-backend
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .            # repo root, so workspace deps resolve
    plan: free
    healthCheckPath: /health
    envVars:
      # Supabase connection string (Session pooler URI, port 5432).
      # Set as a secret in the Render dashboard — do NOT commit it.
      - key: DATABASE_URL
        sync: false
      # Real signing secret for dev JWTs (replace the local dev value).
      - key: JWT_SECRET
        sync: false
      # Your Vercel frontend origin, e.g. https://dse-pms.vercel.app
      - key: CORS_ORIGIN
        sync: false
